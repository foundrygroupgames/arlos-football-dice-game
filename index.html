<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1c33">
<title>Arlo's Football Dice Game</title>
</head>
<body>
<title>Arlo's Football Dice Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --night:#0f2440; --night2:#0b1c33; --panel:#17345a; --panel2:#1d3f6b;
    --line:#2a4d7c; --chalk:#f2f8ff; --muted:#8fa9c6;
    --grass:#37b25e; --grass2:#2c9a4f; --grass3:#1f7a3c;
    --gold:#f6bf4a; --gold2:#e3a92e; --gold3:#a97b12; --goldink:#3a2a00;
    --red:#ff6363; --sky:#57b3ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--night2)}
  body{
    font-family:"Segoe UI Variable Display","Segoe UI",ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;
    color:var(--chalk);
  }
  #app{
    max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--night) 0%,var(--night2) 100%);
  }
  header{
    position:sticky;top:0;z-index:30;min-height:56px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 14px;
    background:rgba(11,28,51,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .hdr-club{font-size:16px;font-weight:800;letter-spacing:.01em;display:flex;align-items:center;gap:7px;min-width:0}
  .hdr-club b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .coins-pill{
    display:inline-flex;align-items:center;gap:5px;flex:none;
    background:linear-gradient(180deg,var(--gold),var(--gold2));color:var(--goldink);
    border-radius:999px;padding:6px 12px;font-weight:800;font-size:15px;
    font-variant-numeric:tabular-nums;box-shadow:0 2px 0 var(--gold3);
  }
  .coins-pill.bump{animation:bump .4s}
  @keyframes bump{40%{transform:scale(1.18)}}
  main{flex:1;padding:14px;padding-bottom:96px}
  h1{font-size:25px;font-weight:900;margin:4px 0 6px;text-wrap:balance;letter-spacing:-.01em}
  h3{font-size:16.5px;font-weight:800;margin:2px 0 4px}
  p{margin:6px 0;line-height:1.5}
  .sub{color:var(--muted);font-size:14px;margin-top:2px}
  .mini{color:var(--muted);font-size:13px;line-height:1.5}
  .center{text-align:center}
  .eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:700;color:var(--muted)}
  .hero{padding:12px 4px 10px;position:relative}
  .hero.small{padding:6px 4px 8px}
  .hero .deco{position:absolute;right:6px;top:6px;display:flex;gap:6px}
  .hero .deco .die:first-child{transform:rotate(-12deg)}
  .hero .deco .die:last-child{transform:rotate(9deg) translateY(6px)}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:18px;
    padding:14px;margin-bottom:12px;
    box-shadow:0 4px 14px rgba(0,0,0,.28);
  }
  .cardhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .btnrow{display:flex;gap:10px}
  .btnrow .btn{flex:1}
  .btn{
    appearance:none;border:0;border-radius:14px;padding:12px 16px;width:100%;
    font:inherit;font-weight:800;font-size:15px;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,var(--grass),var(--grass2));
    box-shadow:0 3px 0 var(--grass3),0 6px 14px rgba(0,0,0,.3);
    margin-top:8px;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--grass3)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold2));color:var(--goldink);box-shadow:0 3px 0 var(--gold3),0 6px 14px rgba(0,0,0,.3)}
  .btn.gold:active{box-shadow:0 1px 0 var(--gold3)}
  .btn.ghost{background:transparent;border:2px solid var(--line);box-shadow:none;color:var(--chalk)}
  .btn.ghost:active{transform:none;background:rgba(255,255,255,.06)}
  .btn.big{padding:15px 18px;font-size:17px;border-radius:16px}
  .btn.slim{padding:9px 12px;font-size:13.5px;margin-top:6px}
  .btn:disabled{opacity:.45;cursor:default;transform:none}
  .btn:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .linkbtn{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;text-decoration:underline;cursor:pointer;padding:8px;display:block;margin:4px auto 12px}
  .chip{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(255,255,255,.08);border:1px solid var(--line);
    border-radius:999px;padding:4px 10px;font-size:12.5px;font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .chip.warn{background:rgba(255,99,99,.16);border-color:rgba(255,99,99,.5)}
  .trates{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .price{color:var(--gold);font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .price.big{font-size:20px}
  .price.sm{font-size:13px}
  .txt{
    width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);
    border-radius:10px;color:var(--chalk);font:inherit;font-weight:700;font-size:15px;
    padding:10px 12px;resize:none;
  }
  .txt::placeholder{color:#6f8cab;font-weight:600}
  label.lbl{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 5px}

  /* dice */
  .die{
    display:inline-grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:2px;padding:6px;width:46px;height:46px;flex:none;
    background:linear-gradient(160deg,#ffffff,#dfe9f2);border-radius:11px;
    box-shadow:inset 0 -3px 0 rgba(15,36,64,.22),0 3px 8px rgba(0,0,0,.35);
    vertical-align:middle;
  }
  .die i{display:block;border-radius:50%}
  .die i.pip{background:#13233a}
  .die.mini{width:21px;height:21px;padding:3px;gap:1px;border-radius:5px;box-shadow:inset 0 -1px 0 rgba(15,36,64,.2),0 1px 3px rgba(0,0,0,.3)}
  .die.mid{width:34px;height:34px;padding:4px;border-radius:8px}
  .die.rolling{animation:shake .14s infinite}
  @keyframes shake{
    0%{transform:rotate(-9deg) translateY(-2px)}
    50%{transform:rotate(9deg) translateY(1px)}
    100%{transform:rotate(-9deg) translateY(-2px)}
  }
  .rollzone{display:flex;gap:10px;justify-content:center;padding:12px 0 4px;flex-wrap:wrap}
  .rollout{text-align:center;font-size:15px;min-height:22px;margin-top:8px;font-variant-numeric:tabular-nums}

  /* setup / pickers */
  .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .swatch{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .swatch.on{border-color:var(--gold)}
  .badgegrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
  .badgegrid button{font-size:22px;background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:10px;padding:6px 0;cursor:pointer}
  .badgegrid button.on{border-color:var(--gold);background:rgba(246,191,74,.15)}
  .kitpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kitopt{background:rgba(255,255,255,.05);border:2px solid var(--line);border-radius:12px;padding:8px 6px 4px;text-align:center;cursor:pointer;width:74px}
  .kitopt.on{border-color:var(--gold);background:rgba(246,191,74,.12)}
  .kitopt .kn{font-size:10.5px;font-weight:700;display:block;margin-top:2px}
  .diffopt{
    display:block;width:100%;text-align:left;font:inherit;color:var(--chalk);cursor:pointer;
    background:rgba(255,255,255,.05);border:2px solid var(--line);border-radius:14px;
    padding:10px 12px;margin:6px 0;
  }
  .diffopt.on{border-color:var(--gold);background:rgba(246,191,74,.12)}
  .diffopt b{font-size:15px}
  .diffopt small{display:block;color:var(--muted);margin-top:2px;line-height:1.4}

  /* players */
  .pcard{padding:12px 14px}
  .mname{font-size:16px;font-weight:800}
  .attrrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .attr{
    display:inline-flex;align-items:center;gap:3px;
    background:rgba(255,255,255,.07);border:1px solid var(--line);
    border-radius:8px;padding:4px 7px;font-size:13px;font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .attr.sm{padding:2px 5px;font-size:11.5px}
  .agechip{background:rgba(87,179,255,.15);border-color:rgba(87,179,255,.4)}
  .pop{animation:pop .35s}
  @keyframes pop{45%{transform:scale(1.05)}}
  .prow{
    display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
    padding:8px 0;border-bottom:1px dashed var(--line);
  }
  .prow:last-of-type{border-bottom:0}
  .prow .pn{font-weight:800;font-size:13px;min-width:64px}
  .prow .pn small{display:block;color:var(--muted);font-weight:600}
  .posbadge{
    display:inline-block;font-size:10px;font-weight:800;letter-spacing:.05em;
    border-radius:6px;padding:2px 6px;margin-bottom:2px;
  }
  .posbadge.gk{background:#f6bf4a;color:#3a2a00}
  .posbadge.df{background:#57b3ff;color:#06263f}
  .posbadge.at{background:#37b25e;color:#06280f}
  .posbadge.sb{background:rgba(255,255,255,.18);color:var(--chalk)}
  .rowactions{display:flex;gap:4px;flex-wrap:nowrap}
  .iconbtn{
    background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:8px;
    font-size:13px;padding:5px 7px;cursor:pointer;color:var(--chalk);
  }

  /* match */
  .vsbig{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;text-align:center;margin-bottom:6px}
  .vsbig .side{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:14px}
  .vbadge{font-size:32px;line-height:1.1}
  .score{font-weight:900;font-style:italic;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .scoreboard{
    position:sticky;top:58px;z-index:20;
    display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;
    background:rgba(11,28,51,.96);border:1px solid var(--line);border-radius:16px;
    padding:8px 12px;margin-bottom:10px;text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.4);
  }
  .sbteam{font-size:12px;font-weight:700;display:flex;flex-direction:column;gap:2px;align-items:center;min-width:0}
  .sbteam b{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sbscore{font-size:28px;color:var(--gold)}
  .advpill{font-size:10px;background:rgba(55,178,94,.25);border:1px solid var(--grass);border-radius:999px;padding:2px 7px;font-weight:700}
  .feed{
    background:
      linear-gradient(180deg,rgba(55,178,94,.12),rgba(55,178,94,.04)),
      repeating-linear-gradient(180deg,rgba(255,255,255,.025) 0 30px,rgba(255,255,255,0) 30px 60px);
    border:1px solid var(--line);border-radius:16px;
    padding:10px;display:flex;flex-direction:column;gap:8px;
    min-height:120px;max-height:34vh;overflow-y:auto;margin-top:10px;
  }
  .ev{
    background:rgba(11,28,51,.78);border-radius:10px;padding:8px 10px;
    font-size:13px;line-height:1.5;animation:slidein .25s;
  }
  @keyframes slidein{from{opacity:0;transform:translateY(-8px)}}
  .ev .die.mini{margin:0 1px;transform:translateY(-1px)}
  .evbig{border:1px solid var(--gold)}
  .evgoal{
    background:linear-gradient(180deg,var(--grass),var(--grass2));
    font-weight:600;border:0;animation:goalpop .45s;
  }
  .evgoal small{opacity:.85;font-weight:400}
  .evbad{background:linear-gradient(180deg,#a63a3a,#8d3030);font-weight:600;border:0;animation:goalpop .45s}
  .evbad small{opacity:.85;font-weight:400}
  @keyframes goalpop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.04)}}
  .evhalf{background:transparent;border:1px dashed var(--line);text-align:center;color:var(--muted)}
  .ftline{text-align:center;font-size:17px;margin:2px 0 4px}
  .dock{
    border:2px solid var(--gold);border-radius:16px;padding:12px;
    background:linear-gradient(180deg,rgba(246,191,74,.12),rgba(246,191,74,.03));
    min-height:96px;
  }
  .dock.passive{border-color:var(--line);background:rgba(255,255,255,.03)}
  .dock .dtitle{font-size:16px;font-weight:800;text-align:center}
  .dock .ddetail{font-size:13px;color:var(--chalk);text-align:center;margin-top:3px;line-height:1.45}
  .dock .dtarget{font-size:15px;font-weight:900;color:var(--gold);text-align:center;margin-top:5px;letter-spacing:.02em}
  .dock .dstatus{font-size:14px;color:var(--muted);text-align:center;padding:22px 0;font-weight:700}
  .dockbanner{text-align:center;padding:8px 0 2px}
  .dockbanner .b1{font-size:21px;font-weight:900;letter-spacing:-.01em}
  .dockbanner .b2{font-size:13.5px;color:var(--chalk);margin-top:4px;line-height:1.45}
  .dockbanner.good .b1{color:#6ee7a0}
  .dockbanner.bad .b1{color:#ff9b9b}
  .skipbar{margin-top:8px;display:flex;justify-content:flex-end}
  .skipbar .btn{width:auto}

  /* league table */
  .tablecard{padding:8px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:6px 4px;text-align:center;border-bottom:1px solid rgba(42,77,124,.5)}
  th{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  td.tl,th.tl{text-align:left;white-space:nowrap;max-width:128px;overflow:hidden;text-overflow:ellipsis}
  tr.me td{background:rgba(246,191,74,.12)}
  tr.up td{box-shadow:inset 3px 0 0 var(--grass)}
  tr.down td{box-shadow:inset 3px 0 0 var(--red)}
  tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}
  .youtag{background:var(--gold);color:var(--goldink);font-size:9px;font-weight:800;border-radius:5px;padding:1px 4px;vertical-align:middle;letter-spacing:.05em}
  .resrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .resrow:last-child{border-bottom:0}
  .resrow b{font-variant-numeric:tabular-nums;white-space:nowrap}
  .resrow span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .resrow span:last-of-type{text-align:right}
  .resrow.lead{background:rgba(246,191,74,.1);border-radius:8px;padding:7px 8px}
  .pennote{display:block;font-size:11px;color:var(--gold);font-weight:700}
  .viewchips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px}
  .viewchips button{
    background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:999px;
    color:var(--chalk);font:inherit;font-size:12.5px;font-weight:700;padding:7px 13px;cursor:pointer;
  }
  .viewchips button.on{background:var(--gold);color:var(--goldink);border-color:var(--gold2)}
  .receipt{font-size:14px;font-variant-numeric:tabular-nums}
  .receipt .rrow{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .receipt .rrow:last-child{border-bottom:0;font-weight:900}
  .receipt .rrow b{color:var(--gold)}

  /* club */
  .dots{display:flex;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid var(--line)}
  .dot.on{background:var(--gold);border-color:var(--gold2)}
  .next{border-color:var(--grass)}

  /* modal */
  #overlay{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(4,12,24,.72);
    align-items:flex-end;justify-content:center;
  }
  .sheet{
    background:linear-gradient(180deg,var(--panel),var(--night));
    border:1px solid var(--line);border-bottom:0;
    border-radius:22px 22px 0 0;padding:18px 16px 26px;
    width:min(430px,100%);max-height:82vh;overflow-y:auto;
    animation:sheetup .28s;
  }
  @keyframes sheetup{from{transform:translateY(40px);opacity:0}}
  .rowbtn{
    display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;
    padding:11px 12px;margin:6px 0;color:var(--chalk);font:inherit;font-size:14px;cursor:pointer;text-align:left;
  }
  .rowbtn b{color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap}
  .rowbtn small{color:var(--muted);display:block}
  .rowbtn.off{opacity:.4;cursor:default}
  .scoutrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .scoutrow span:first-child{flex:1}
  .scoutrow b{min-width:34px;text-align:right;font-variant-numeric:tabular-nums}
  .sdice{display:flex;gap:4px}

  /* tab bar */
  #tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:min(430px,100%);z-index:40;
    display:none;gap:2px;
    background:rgba(11,28,51,.97);border-top:1px solid var(--line);
    padding:6px 6px calc(8px + env(safe-area-inset-bottom));
  }
  #tabbar button{
    flex:1;background:none;border:0;border-radius:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font:inherit;font-size:18px;padding:6px 0;color:var(--muted);
  }
  #tabbar button span{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  #tabbar button.on{color:var(--gold);background:rgba(246,191,74,.1)}

  #toast{
    position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--chalk);color:var(--night);font-weight:700;font-size:14px;
    border-radius:999px;padding:10px 18px;box-shadow:0 6px 20px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:all .25s;z-index:60;max-width:88vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .shakeit{animation:shakeit .35s}
  @keyframes shakeit{20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>

<div id="app">
  <header>
    <button class="iconbtn" id="homeBtn" style="display:none;font-size:16px;flex:none" onclick="goHome()" title="Home">🏠</button>
    <div id="hdrClub" class="hdr-club">🎲 Arlo's Football Dice Game</div>
    <div id="hdrCoins" class="coins-pill" style="display:none">🪙 <b id="coinCount">0</b></div>
  </header>
  <main id="screen"></main>
  <nav id="tabbar">
    <button data-tab="club">🏟️<span>Club</span></button>
    <button data-tab="match">⚽<span>Match</span></button>
    <button data-tab="market">🔁<span>Transfers</span></button>
    <button data-tab="tables">🏆<span>Tables</span></button>
    <button data-tab="boss">🧢<span>Boss</span></button>
  </nav>
  <div id="overlay"></div>
  <div id="toast"></div>
</div>

<script>
/* ================= helpers ================= */
const KEY='footyManager_v3';
const VERSION='0.9';
const FB={key:'AIzaSyCzyXeuFDYkYeKkpnpJish1gh7WIWiNBLU',pid:'arlos-football-dice'};
const $=s=>document.querySelector(s);
const d6=()=>Math.floor(Math.random()*6)+1;
const rollN=n=>Array.from({length:n},d6);
const sum=a=>a.reduce((x,y)=>x+y,0);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>'t_'+Math.random().toString(36).slice(2,10);
const esc=t=>(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
const fmt=n=>Math.round(n).toLocaleString('en-GB');
const choice=a=>a[Math.floor(Math.random()*a.length)];
const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

const RUDE_STRONG=['fuck','shit','cunt','twat','wank','bollock','bastard','bitch','prick','knob','bellend','dickhead','arsehole','asshole','slag','shag','whore','slut','nigger','nigga','paki','spastic','retard','faggot','nazi','hitler','porn'];
const RUDE_EXACT=['dick','cock','piss','arse','ass','tit','tits','hoe','fag','sex','homo'];
function cleanTxt(t){
  return (t||'').toLowerCase()
    .replaceAll('0','o').replaceAll('1','i').replaceAll('3','e').replaceAll('4','a')
    .replaceAll('5','s').replaceAll('7','t').replaceAll('@','a').replaceAll('$','s')
    .replace(/[^a-z]/g,'');
}
function isRude(name){
  const whole=cleanTxt(name);
  if(RUDE_STRONG.some(w=>whole.includes(w)))return true;
  const words=(name||'').toLowerCase().split(/[^a-z0-9@$]+/).map(cleanTxt).filter(Boolean);
  return words.some(w=>RUDE_EXACT.includes(w)||RUDE_STRONG.includes(w));
}
function checkName(v,what){
  if(!v||!v.trim())return what+' needs a name!';
  if(isRude(v))return 'Let’s pick a nicer name than that! 😅';
  return null;
}

function rollAttr(mod){
  const a=d6(),b=d6(),raw=a+b,star=raw>=11;
  const value=star?10:clamp(raw+(mod||0),2,10);
  return {dice:[a,b],raw,value,star};
}
function attrVal(a){return a.star?a.value+'⭐':String(a.value);}
function genPlayer(mod,ageMin,ageMax,excludeNames){
  const used=new Set(excludeNames||[]);
  const pool=FIRST_NAMES.filter(n=>!used.has(n));
  const attrs={};
  ATTRS.forEach(a=>attrs[a[0]]=rollAttr(mod));
  return {name:pool.length?choice(pool):'Kid '+rnd(1,99),age:rnd(ageMin===undefined?18:ageMin,ageMax===undefined?33:ageMax),attrs,out:null};
}
function pTotal(p){return ATTRS.reduce((s,a)=>s+p.attrs[a[0]].value,0);}
function pStars(p){return ATTRS.reduce((s,a)=>s+(p.attrs[a[0]].star?1:0),0);}
function priceOf(p){return pTotal(p)*10+pStars(p)*150;}
function sellOf(p){return Math.round(priceOf(p)*0.6);}
function isOut(p){return !!(p&&p.out&&p.out.weeks>0);}
function youthFill(){
  const attrs={};
  ATTRS.forEach(a=>attrs[a[0]]={dice:[2,2],raw:4,value:4,star:false});
  return {name:'Youth cover',age:17,attrs,out:null,fill:true};
}
/* positions: players array order = [GK, DEF, DEF, ATT, ATT, SUB] */
function autoAssign(t){
  const ps=t.players.slice();
  const pick=(arr,key)=>{
    let bi=0;for(let i=1;i<arr.length;i++)if(arr[i].attrs[key].value>arr[bi].attrs[key].value)bi=i;
    return arr.splice(bi,1)[0];
  };
  const gk=pick(ps,'gk');
  const d1=pick(ps,'def'),d2=pick(ps,'def');
  const a1=pick(ps,'sho'),a2=pick(ps,'sho');
  t.players=[gk,d1,d2,a1,a2,ps[0]];
}
function activeFive(t){
  const slots=[];
  let subUsed=false;
  for(let i=0;i<5;i++){
    const p=t.players[i];
    if(!isOut(p)){slots.push(p);continue;}
    const sub=t.players[5];
    if(sub&&!isOut(sub)&&!subUsed){subUsed=true;slots.push(sub);}
    else slots.push(youthFill());
  }
  return slots;
}
function ratings(t){
  const L=activeFive(t);
  return {
    defence:30+(2-(t.tier===undefined?2:t.tier))+Math.ceil((3*L[0].attrs.gk.value+2*(L[1].attrs.def.value+L[2].attrs.def.value))/3),
    attack:31+Math.ceil((2.5*(L[3].attrs.sho.value+L[4].attrs.sho.value)+L[3].attrs.pas.value+L[4].attrs.pas.value)/3),
    leadership:10+Math.ceil(L.reduce((s,p)=>s+p.attrs.lea.value,0)/2)
  };
}
function teamStars(t){
  const L=activeFive(t);
  const st={atk:0,def:0,lea:0};
  L.forEach((p,i)=>{
    if(p.attrs.lea.star)st.lea++;
    if(i===0&&p.attrs.gk.star)st.def++;
    if((i===1||i===2)&&p.attrs.def.star)st.def++;
    if((i===3||i===4)&&(p.attrs.sho.star||p.attrs.pas.star))st.atk++;
  });
  return st;
}
function teamStr(t){return activeFive(t).reduce((s,p)=>s+pTotal(p),0);}
function avgAge(t){return Math.round(t.players.reduce((s,p)=>s+p.age,0)/t.players.length);}
function keeperOf(t){return activeFive(t)[0].name;}
function pickScorer(t){
  if(d6()===6)return 'Own Goal';
  const L=activeFive(t);
  const w=[1,L[1].attrs.sho.value,L[2].attrs.sho.value,L[3].attrs.sho.value*3,L[4].attrs.sho.value*3];
  let r=Math.random()*sum(w);
  for(let i=0;i<5;i++){r-=w[i];if(r<=0)return L[i].name;}
  return L[4].name;
}
function pickAssist(t){
  if(d6()===6)return 'No Assist';
  const L=activeFive(t);
  const w=[1,L[1].attrs.pas.value,L[2].attrs.pas.value,L[3].attrs.pas.value*2,L[4].attrs.pas.value*2];
  let r=Math.random()*sum(w);
  for(let i=0;i<5;i++){r-=w[i];if(r<=0)return L[i].name;}
  return L[3].name;
}

function genTeamName(usedNames,usedPlaces){
  let place,tries=0;
  do{place=choice(PLACES);tries++;}while(usedPlaces.has(place)&&tries<300);
  usedPlaces.add(place);
  let name;tries=0;
  do{name=place+' '+choice(SUFFIXES);tries++;}while(usedNames.has(name)&&tries<50);
  usedNames.add(name);
  return name;
}
function genAITeam(tier,usedNames,usedPlaces){
  const name=genTeamName(usedNames,usedPlaces);
  const players=[];
  for(let i=0;i<6;i++)players.push(genPlayer(TIER_MOD[tier],18,33,players.map(p=>p.name)));

  autoAssign(t);
  return t;
}

  const teams=[];
  for(let tier=0;tier<3;tier++){

  genMarket();
  S.phase='play';S.tab='club';
  delete S.setup;
  save();
}
function doubleRR(ids){
  const t=shuffle(ids),rounds=[];
  for(let r=0;r<t.length-1;r++){
    const pairs=[];
    for(let i=0;i<t.length/2;i++){
      const a=t[i],b=t[t.length-1-i];
      pairs.push(r%2?{homeId:b,awayId:a}:{homeId:a,awayId:b});
    }
    rounds.push(pairs);
    t.splice(1,0,t.pop());
  }
  const back=rounds.map(rd=>rd.map(f=>({homeId:f.awayId,awayId:f.homeId})));
  return rounds.concat(back);
}
function buildSeasonSchedule(){
  S.fixturesByLeague=[0,1,2].map(L=>doubleRR(S.leagues[L]));
  S.resultsByLeague=[[],[],[]];
  const drawn=shuffle(S.teams.map(t=>t.id));
  const byes=drawn.slice(0,2);
  const rest=drawn.slice(2);
  const ties=[];
  for(let i=0;i<rest.length;i+=2)ties.push({homeId:rest[i],awayId:rest[i+1],winnerId:null,result:null});
  S.cup={rounds:[{ties,byes:byes.slice()}],userOut:false,winnerId:null};
  const cupAfter={4:0,8:1,11:2,14:3,17:4};
  S.weeks=[];
  for(let r=0;r<18;r++){
    S.weeks.push({type:'league',round:r});
    if(cupAfter[r+1]!==undefined)S.weeks.push({type:'cup',round:cupAfter[r+1]});
  }
  S.weekIdx=0;
}

/* ================= match engine =================
   Resolution is in "dice pips": the second roller needs N or more
   on two dice (N clamped 4–10 so there is ALWAYS hope and ALWAYS risk). */
function homeAdvOf(t){return t.stadium>=5?3:t.stadium>=3?2:1;}
/* Team-quality gaps count half toward the dice target (rounded up, never to zero).
   Keeps favourites favoured without letting them win every single roll. */
function pipGap(x){return Math.sign(x)*Math.ceil(Math.abs(x)/2);}
function minuteFor(half,n,total){
  return half===1?5+Math.floor((40/Math.max(total,1))*(n-1)):50+Math.floor((40/Math.max(total,1))*(n-1));
}
function autoIO(){
  return {
    async roll(req){const dice=rollN(req.n);return (req.kind==='shot'||req.kind==='defend')?{dice,boost:0}:dice;},
    async event(){}
  };
}
async function runMatch(home,away,opts){
  opts=opts||{};
  const io=opts.io||autoIO();
  const user=opts.userSide||null;
  const homeAdv=opts.neutral?0:homeAdvOf(home);
  const st={hs:0,as:0,
    h:{atk:teamStars(home).atk,def:teamStars(home).def,lea:teamStars(home).lea},
    a:{atk:teamStars(away).atk,def:teamStars(away).def,lea:teamStars(away).lea}};
  const goals=[];
  const sides=[
    {t:home,key:'h',other:'a',oT:away,side:'home',adv:homeAdv},
    {t:away,key:'a',other:'h',oT:home,side:'away',adv:0}
  ];
  await io.event({t:'start',homeName:home.name,awayName:away.name,adv:homeAdv,neutral:!!opts.neutral});
  for(const half of [1,2]){
    await io.event({t:'half',n:half});
    const chances={};
    for(const s of sides){
      if(opts.onlySide&&s.side!==opts.onlySide){chances[s.side]=0;continue;}
      const lea=ratings(s.t).leadership;
      const oppLea=ratings(s.oT).leadership;
      const edge=lea-oppLea;
      const mine=user===s.side;
      const sub=rollN(2),subSum=sum(sub);
      let target='';
      if(mine){
        const n4=clamp(2+subSum-edge,2,13),n5=clamp(8+subSum-edge,2,13);
        target='Their pull: −'+subSum+'. '+(n4<=12?'Roll '+n4+'+ for 4 chances'+(n5<=12?' · '+n5+'+ for 5!':'!'):'3 chances are likely — roll for luck!');
      }
      const add=await io.roll({n:2,mine,kind:'talk',who:s.t.name,
        title:'📣 Team talk!',
        detail:'Your leadership '+lea+' vs their '+oppLea+' — your dice minus theirs decide the chances.',
        target});
      const total=edge+sum(add)-subSum;
      let c=2;if(total>=8)c=5;else if(total>=2)c=4;else if(total>=-6)c=3;
      chances[s.side]=c;
      await io.event({t:'talk',id:s.t.id,name:s.t.name,lea,opp:oppLea,add:sum(add),sub:subSum,total,ch:c,mine});
    }
    const maxC=Math.max(chances.home,chances.away);
    for(let i=1;i<=maxC;i++){
      for(const s of sides){
        if(i<=chances[s.side])await doChance(s,half,i,chances[s.side],false);
      }
    }
    if(half===2){
      for(const s of sides){
        if(opts.onlySide&&s.side!==opts.onlySide)continue;
        for(let i=1;i<=st[s.key].lea;i++){
          await doChance(s,2,chances[s.side]+i,chances[s.side]+st[s.key].lea,true);
        }
      }
      if(st.hs===0&&st.as===0&&!opts.onlySide){
        await io.event({t:'scramble'});
        for(const s of sides)await doChance(s,2,9,9,true);
      }
    }
  }
  await io.event({t:'ft',score:[st.hs,st.as]});
  let penWinnerId=null;
  if(opts.knockout&&st.hs===st.as){
    await io.event({t:'pens'});
    while(true){
      const hMine=user==='home',aMine=user==='away';
      const hd=await io.roll({n:1,mine:hMine,kind:'pen',who:home.name,title:'🥅 Penalty roll-off!',detail:'One die each — highest wins the tie.',target:'Roll high!'});
      const ad=await io.roll({n:1,mine:aMine,kind:'pen',who:away.name,title:'🥅 Penalty roll-off!',detail:'One die each — highest wins the tie.',target:'Roll high!'});
      await io.event({t:'penroll',homeName:home.name,awayName:away.name,h:hd[0],a:ad[0],mine:!!user});
      if(hd[0]!==ad[0]){penWinnerId=hd[0]>ad[0]?home.id:away.id;break;}
    }
    await io.event({t:'penwin',name:(penWinnerId===home.id?home:away).name,mine:penWinnerId===S.clubId});
  }
  return {homeId:home.id,awayId:away.id,homeName:home.name,awayName:away.name,
    homeScore:st.hs,awayScore:st.as,goals,penWinnerId};

  async function doChance(s,half,n,tot,late){
    const atkT=s.t,defT=s.oT;
    const defSide=sides.find(x=>x!==s);
    const mineAtk=user===s.side,mineDef=user===defSide.side;
    const dice=await io.roll({n:6,mine:mineAtk,kind:'chance',who:atkT.name,
      title:late?'⏱️ Late chance!':'⚡ Attack!',
      detail:'All six dice for '+atkT.name+'.',
      target:'You need 20 or more for a BIG CHANCE'});
    const ct=sum(dice);
    await io.event({t:'chance',id:atkT.id,name:atkT.name,dice,total:ct,big:ct>=20,late,mine:mineAtk});
    if(ct<20)return;
    const arBase=ratings(atkT).attack+s.adv;
    const drBase=ratings(defT).defence;
    const aSt=st[s.key],dSt=st[s.other];
    // urgency: a team chasing by 2+ attacks with more heart (-1 to their target);
    // a team cruising 2+ up finds massed defences (+1)
    const sdiff=s.side==='home'?st.hs-st.as:st.as-st.hs;
    const urg=opts.onlySide?0:(sdiff<=-2?-1:sdiff>=2?1:0);
    let outcome;
    if(mineAtk){
      // defender rolls first (hidden), then YOU shoot at an exact target
      const dDice=rollN(2);
      let dExtra=(dDice[0]===6&&dDice[1]===6)?3:0;
      let needed=clamp(sum(dDice)+dExtra+pipGap(drBase-arBase)+1+urg,4,10);
      const aRes=await io.roll({n:2,mine:true,kind:'shot',boostable:!opts.noBoost,who:atkT.name,needed,
        title:'🥅 SHOOT!',
        detail:'Your attack is '+arBase+'. Their keeper is set…'+(dExtra?' and their defence rolled a DOUBLE SIX (Worldie +3)!':''),
        target:'🎯 Roll '+needed+' or more on two dice to SCORE!'+(urg===-1?' ⚡ You’re chasing — easier target!':urg===1?' 😤 They’ve packed the box!':'')});
      outcome=resolveShot(true,aRes,needed,dExtra>0,aSt,dSt);
    }else if(mineDef){
      // attacker rolls first, then YOU save with an exact target
      const aDice=rollN(2);
      let aExtra=(aDice[0]===6&&aDice[1]===6)?3:0;
      let needed=clamp(sum(aDice)+aExtra-pipGap(drBase-arBase)-urg,4,10);
      const dRes=await io.roll({n:2,mine:true,kind:'defend',boostable:!opts.noBoost,who:defT.name,needed,
        title:'🧤 DEFEND!',
        detail:'Their attack rolled '+sum(aDice)+(aExtra?' — a DOUBLE SIX (Screamer +3)!':'')+'. Your defence is '+drBase+'.',
        target:'🎯 Roll '+needed+' or more on two dice to SAVE! (Ties save)'+(urg===-1?' ⚡ They’re desperate!':'')});
      outcome=resolveDefend(dRes,needed,aExtra>0,aSt,dSt);
    }else{
      const aDice=rollN(2),dDice=rollN(2);
      const aExtra=(aDice[0]===6&&aDice[1]===6)?3:0;
      const needed=clamp(sum(aDice)+aExtra-pipGap(drBase-arBase)-urg,4,10);
      const dExtra=(dDice[0]===6&&dDice[1]===6)?3:0;
      let save=sum(dDice)+dExtra>=needed;
      let uas=false,uds=false;
      if(save&&aSt.atk>0){aSt.atk--;uas=true;save=sum(dDice)+dExtra>=needed+3;}
      if(!save&&dSt.def>0){dSt.def--;uds=true;save=sum(dDice)+dExtra+3>=needed+(uas?3:0);}
      outcome={goal:!save,rolled:sum(dDice),needed,screamer:aExtra>0,worldie:dExtra>0,uas,uds,boost:0};
    }
    if(outcome.goal){
      const sc=pickScorer(atkT);
      let asst=sc==='Own Goal'?'No Assist':pickAssist(atkT);
      if(asst===sc)asst='No Assist';
      const minute=minuteFor(half,n,tot);
      if(s.side==='home')st.hs++;else st.as++;
      goals.push({minute,teamId:atkT.id,team:atkT.name,scorer:sc,assist:asst});
      await io.event({t:'shot',goal:true,id:atkT.id,name:atkT.name,defName:defT.name,
        needed:outcome.needed,rolled:outcome.rolled,boost:outcome.boost,
        screamer:outcome.screamer,worldie:outcome.worldie,uas:outcome.uas,uds:outcome.uds,
        scorer:sc,assist:asst,minute,score:[st.hs,st.as],mineAtk,mineDef});
    }else{
      await io.event({t:'shot',goal:false,id:atkT.id,name:atkT.name,defName:defT.name,
        needed:outcome.needed,rolled:outcome.rolled,boost:outcome.boost,
        screamer:outcome.screamer,worldie:outcome.worldie,uas:outcome.uas,uds:outcome.uds,
        saver:keeperOf(defT),score:null,mineAtk,mineDef});
    }

    function resolveShot(mine,aRes,needed,worldie,aSt,dSt){
      const aDice=aRes.dice,boost=aRes.boost||0;
      const screamer=(aDice[0]===6&&aDice[1]===6);
      let eff=sum(aDice)+boost+(screamer?3:0);
      let uas=false,uds=false;
      let goal=eff>=needed;
      if(!goal&&aSt.atk>0){aSt.atk--;uas=true;eff+=3;goal=eff>=needed;}
      if(goal&&dSt.def>0){dSt.def--;uds=true;needed+=3;goal=eff>=needed;}
      return {goal,rolled:sum(aDice),needed,screamer,worldie,uas,uds,boost};
    }
    function resolveDefend(dRes,needed,screamer,aSt,dSt){
      const dDice=dRes.dice,boost=dRes.boost||0;
      const worldie=(dDice[0]===6&&dDice[1]===6);
      let eff=sum(dDice)+boost+(worldie?3:0);
      let uds=false,uas=false;
      let save=eff>=needed;
      if(!save&&dSt.def>0){dSt.def--;uds=true;eff+=3;save=eff>=needed;}
      if(save&&aSt.atk>0){aSt.atk--;uas=true;needed+=3;save=eff>=needed;}
      return {goal:!save,rolled:sum(dDice),needed,screamer,worldie,uas,uds,boost};
    }
  }
}

/* ================= tables & records ================= */
function tableFor(L){
  const map={};
  S.leagues[L].forEach(id=>{const t=team(id);map[id]={id,name:t.name,badge:t.badge,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,str:teamStr(t)};});
  S.resultsByLeague[L].forEach(r=>{
    const h=map[r.homeId],a=map[r.awayId];
    if(!h||!a)return;
    h.P++;a.P++;h.GF+=r.homeScore;h.GA+=r.awayScore;a.GF+=r.awayScore;a.GA+=r.homeScore;
    if(r.homeScore>r.awayScore){h.W++;h.Pts+=3;a.L++;}
    else if(r.homeScore<r.awayScore){a.W++;a.Pts+=3;h.L++;}
    else{h.D++;a.D++;h.Pts++;a.Pts++;}
  });
  Object.values(map).forEach(t=>t.GD=t.GF-t.GA);
  return Object.values(map).sort((x,y)=>y.Pts-x.Pts||y.GD-x.GD||y.GF-x.GF||x.name.localeCompare(y.name));
}
function recordResult(r,L){
  if(L!==null&&L!==undefined)S.resultsByLeague[L].push({homeId:r.homeId,awayId:r.awayId,homeName:r.homeName,awayName:r.awayName,homeScore:r.homeScore,awayScore:r.awayScore,penWinnerId:r.penWinnerId||null});
  r.goals.forEach(g=>{
    if(g.scorer!=='Own Goal'&&g.scorer!=='Youth cover'){const k=g.team+' — '+g.scorer;S.goals[k]=(S.goals[k]||0)+1;}
    if(g.assist!=='No Assist'&&g.assist!=='Youth cover'){const k=g.team+' — '+g.assist;S.assists[k]=(S.assists[k]||0)+1;}
  });
}
function scorersFor(L,map){
  const names=new Set(S.leagues[L].map(id=>team(id).name));
  return Object.entries(map).map(e=>({n:e[0],g:e[1]}))
    .filter(x=>names.has(x.n.split(' — ')[0]))
    .sort((a,b)=>b.g-a.g||a.n.localeCompare(b.n));
}
function resultLine(r,highlightUser){
  const mine=highlightUser&&(r.homeId===S.clubId||r.awayId===S.clubId);
  let pens='';
  if(r.penWinnerId){
    const w=team(r.penWinnerId);
    pens='<span class="pennote">🥅 '+esc(w?w.name:'')+' win on penalties!</span>';
  }
  return '<div class="resrow'+(mine?' lead':'')+'"><span>'+esc(r.homeName)+'</span><b>'+r.homeScore+' – '+r.awayScore+pens+'</b><span>'+esc(r.awayName)+'</span></div>';
}

/* ================= week processing ================= */
function currentWeek(){return S.weeks[S.weekIdx]||null;}
function userFixtureThisWeek(){
  const wk=currentWeek();
  if(!wk)return null;
  if(wk.type==='league'){
    const f=S.fixturesByLeague[userLeagueIdx()][wk.round].find(f=>f.homeId===S.clubId||f.awayId===S.clubId);
    return f?{homeId:f.homeId,awayId:f.awayId,comp:'league',neutral:false}:null;
  }
  const rd=S.cup.rounds[wk.round];
  if(!rd)return null;
  const tie=rd.ties.find(t=>!t.winnerId&&(t.homeId===S.clubId||t.awayId===S.clubId));
  if(!tie)return null;
  return {homeId:tie.homeId,awayId:tie.awayId,comp:'cup',neutral:wk.round===4,tie};
}
function applyCupResult(tie,r){
  tie.result={homeName:r.homeName,awayName:r.awayName,homeScore:r.homeScore,awayScore:r.awayScore,penWinnerId:r.penWinnerId||null};
  tie.winnerId=r.penWinnerId||(r.homeScore>r.awayScore?r.homeId:r.awayId);
  if((tie.homeId===S.clubId||tie.awayId===S.clubId)&&tie.winnerId!==S.clubId)S.cup.userOut=true;
}
function advanceCupDraw(round){
  const rd=S.cup.rounds[round];
  if(rd.ties.some(t=>!t.winnerId))return;
  const winners=rd.ties.map(t=>t.winnerId).concat(rd.byes||[]);
  if(winners.length===1){S.cup.winnerId=winners[0];return;}
  const drawn=shuffle(winners);
  const ties=[];
  for(let i=0;i<drawn.length;i+=2)ties.push({homeId:drawn[i],awayId:drawn[i+1],winnerId:null,result:null});
  S.cup.rounds.push({ties,byes:[]});
}
function tickInjuries(){
  const news=[];
  userTeam().players.forEach(p=>{
    if(isOut(p)){
      p.out.weeks--;
      if(p.out.weeks<=0){p.out=null;news.push({type:'back',name:p.name});}
    }
  });
  const fit=userTeam().players.filter(p=>!isOut(p));
  if(Math.random()<0.22&&fit.length){
    const p=choice(fit);
    if(d6()<=4){p.out={type:'injury',weeks:rnd(1,2)};news.push({type:'injury',name:p.name,weeks:p.out.weeks});}
    else{p.out={type:'ban',weeks:1};news.push({type:'ban',name:p.name});}
  }
  return news;
}
function maybeOffer(){
  if(Math.random()>=0.2)return null;
  const candidates=userTeam().players.filter(p=>!p.fill);
  const p=candidates.reduce((a,b)=>Math.random()<pTotal(b)/(pTotal(a)+pTotal(b))?b:a);
  const buyers=S.teams.filter(t=>t.id!==S.clubId&&t.tier<=userLeagueIdx());
  const buyer=choice(buyers.length?buyers:S.teams.filter(t=>t.id!==S.clubId));
  const amount=Math.round(priceOf(p)*(1.2+Math.random()*0.3)/10)*10;
  return {playerName:p.name,buyerId:buyer.id,amount};
}
async function resolveWeek(userResult){
  const wk=currentWeek();
  const others=[];
  if(wk.type==='league'){
    if(userResult)recordResult(userResult,userLeagueIdx());
    for(let L=0;L<3;L++){
      for(const f of S.fixturesByLeague[L][wk.round]){
        if(f.homeId===S.clubId||f.awayId===S.clubId)continue;
        const r=await runMatch(team(f.homeId),team(f.awayId),{io:autoIO()});
        recordResult(r,L);
        if(L===userLeagueIdx())others.push(r);
      }
    }
  }else{
    const rd=S.cup.rounds[wk.round];
    if(userResult){
      const tie=rd.ties.find(t=>t.homeId===S.clubId||t.awayId===S.clubId);
      if(tie&&!tie.winnerId){applyCupResult(tie,userResult);recordResult(userResult,null);}
    }
    for(const tie of rd.ties){
      if(tie.winnerId)continue;
      const r=await runMatch(team(tie.homeId),team(tie.awayId),{io:autoIO(),neutral:wk.round===4,knockout:true});
      applyCupResult(tie,r);recordResult(r,null);
      others.push(r);
    }
    advanceCupDraw(wk.round);
  }
  S.weekNews=tickInjuries();
  S.pendingOffer=S.weekIdx<S.weeks.length-1?maybeOffer():null;
  genMarket();
  S.weekIdx++;
  if(S.weekIdx>=S.weeks.length)finishSeason();
  save();
  return others;
}

/* ================= season end ================= */
function ageTeam(t,rookieMod,report){
  t.players=t.players.map(p=>{
    p.age++;p.out=null;
    if(p.age>=35){
      const rk=genPlayer(rookieMod,18,18,t.players.map(x=>x.name));
      if(report)report.push({type:'retire',out:p.name,inn:rk.name});
      return rk;
    }
    const improving=p.age<=28;
    const pool=ATTRS.map(a=>a[0]).filter(k=>!p.attrs[k].star&&(improving?p.attrs[k].value<10:p.attrs[k].value>2));
    if(pool.length){
      const k=choice(pool);
      p.attrs[k].value+=improving?1:-1;
      if(report)report.push({type:improving?'up':'down',name:p.name,attr:k,val:p.attrs[k].value,age:p.age});
    }
    return p;
  });
}
function aiReinforce(t){
  // every AI club signs one promising player to replace its weakest — keeps rivals dangerous
  let wi=0;
  t.players.forEach((p,i)=>{if(pTotal(p)<pTotal(t.players[wi]))wi=i;});
  const r1=genPlayer(TIER_MOD[t.tier],18,24,t.players.map(x=>x.name));
  const r2=genPlayer(TIER_MOD[t.tier],18,24,t.players.map(x=>x.name));
  t.players[wi]=pTotal(r1)>=pTotal(r2)?r1:r2;
  autoAssign(t);
}
function finishSeason(){
  const uL=userLeagueIdx();
  const tables=[tableFor(0),tableFor(1),tableFor(2)];
  const uPos=tables[uL].findIndex(t=>t.id===S.clubId)+1;
  const uPts=tables[uL][uPos-1].Pts;
  let money=PRIZES[uL][uPos-1]||100;
  const lines=['League prize ('+ordinal(uPos)+' in '+LEAGUE_NAMES[uL]+'): 🪙 '+fmt(PRIZES[uL][uPos-1])];
  const up2=tables[1].slice(0,2).map(t=>t.id),down1=tables[0].slice(-2).map(t=>t.id);
  const up3=tables[2].slice(0,2).map(t=>t.id),down2=tables[1].slice(-2).map(t=>t.id);
  let moved=null;
  if(uL===0&&down1.includes(S.clubId))moved='down';
  if(uL===1&&up2.includes(S.clubId))moved='up';
  if(uL===1&&down2.includes(S.clubId))moved='down';
  if(uL===2&&up3.includes(S.clubId))moved='up';
  if(moved==='up'){const b=PROMO_BONUS[uL-1];money+=b;lines.push('PROMOTED to '+LEAGUE_NAMES[uL-1]+'! 🎉 Bonus: 🪙 '+fmt(b));S.manager.promotions++;}
  if(moved==='down')lines.push('Relegated to '+LEAGUE_NAMES[uL+1]+'. The dice will turn! 💪');
  if(uPos===1)S.manager.titles[uL]++;
  let cupLine='';
  const cupWon=S.cup.winnerId===S.clubId;
  if(cupWon){money+=1500;cupLine='🏆 CUP WINNERS! Prize: 🪙 1,500';S.manager.cups++;}
  else{
    const reached=S.cup.rounds.filter(rd=>rd.ties.some(t=>(t.homeId===S.clubId||t.awayId===S.clubId))||(rd.byes||[]).includes(S.clubId)).length;
    const cp=[0,100,250,400,600][Math.min(reached-1,4)]||0;
    if(S.cup.winnerId&&team(S.cup.winnerId))cupLine='Cup winners: '+team(S.cup.winnerId).badge+' '+esc(team(S.cup.winnerId).name)+'. You reached '+(CUP_ROUND_NAMES[reached-1]||'Round 1')+' (🪙 '+fmt(cp)+').';
    money+=cp;
  }
  const boot=scorersFor(uL,S.goals)[0]||null;
  const ass=scorersFor(uL,S.assists)[0]||null;
  const uName=userTeam().name;
  const awards=[];
  if(boot){
    let l='👟 Golden Boot: '+boot.n+' ('+boot.g+' goals)';
    if(boot.n.startsWith(uName+' — ')){money+=300;l+=' — your player! Club bonus 🪙 300';}
    awards.push(l);
  }
  if(ass){
    let l='🅰️ Top Assists: '+ass.n+' ('+ass.g+')';
    if(ass.n.startsWith(uName+' — ')){money+=200;l+=' — your player! Club bonus 🪙 200';}
    awards.push(l);
  }
  const myGoals=Object.entries(S.goals).filter(e=>e[0].startsWith(uName+' — ')).map(e=>({player:e[0].split(' — ')[1],n:e[1]})).sort((a,b)=>b.n-a.n)[0];
  if(myGoals&&(!S.manager.bestGoals||myGoals.n>S.manager.bestGoals.n))S.manager.bestGoals={player:myGoals.player,n:myGoals.n,season:S.season};
  const myAss=Object.entries(S.assists).filter(e=>e[0].startsWith(uName+' — ')).map(e=>({player:e[0].split(' — ')[1],n:e[1]})).sort((a,b)=>b.n-a.n)[0];
  if(myAss&&(!S.manager.bestAssists||myAss.n>S.manager.bestAssists.n))S.manager.bestAssists={player:myAss.player,n:myAss.n,season:S.season};
  S.manager.seasons++;
  S.coins+=money;
  const newL0=tables[0].slice(0,8).map(t=>t.id).concat(up2);
  const newL1=down1.concat(tables[1].slice(2,8).map(t=>t.id)).concat(up3);
  const newL2=down2.concat(tables[2].slice(2,10).map(t=>t.id));
  S.leagues=[newL0,newL1,newL2];
  S.leagues.forEach((l,i)=>l.forEach(id=>{team(id).tier=i;}));
  const agingReport=[];
  S.teams.forEach(t=>{
    if(t.id===S.clubId){ageTeam(t,-1,agingReport);}
    else{ageTeam(t,TIER_MOD[t.tier],null);aiReinforce(t);}
  });
  S.history.push({season:S.season,tier:uL,pos:uPos,pts:uPts,cup:cupWon?'Winners':'',moved});
  S.endReport={uL,uPos,money,lines,cupLine,awards,agingReport,moved,step:0,
    table:tables[uL].map(t=>({id:t.id,name:t.name,badge:t.badge,Pts:t.Pts}))};
  save();
}
function startNewSeason(){
  S.season++;
  S.goals={};S.assists={};S.endReport=null;S.weekNews=[];S.pendingOffer=null;
  buildSeasonSchedule();
  genMarket();
  S.tab='club';
  save();render();
  toast('Season '+S.season+' — here we go! ⚽');
}

/* ================= dice widgets ================= */
const PIPS={1:[4],2:[2,6],3:[2,4,6],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function face(v){let h='';for(let i=0;i<9;i++)h+='<i'+(PIPS[v].includes(i)?' class="pip"':'')+'></i>';return h;}
function dieHTML(v,cls){return '<span class="die '+(cls||'')+'">'+face(v)+'</span>';}
function miniDice(vals){return vals.map(v=>dieHTML(v,'mini')).join('');}
function animateDice(el,finals,fast){
  return new Promise(res=>{
    const dies=[...el.querySelectorAll('.die')];
    dies.forEach(d=>d.classList.add('rolling'));
    const iv=setInterval(()=>dies.forEach(d=>d.innerHTML=face(d6())),90);
    setTimeout(()=>{
      clearInterval(iv);
      dies.forEach((d,i)=>{d.classList.remove('rolling');d.innerHTML=face(finals[i]);});
      vibrate(30);
      setTimeout(res,140);
    },fast?450:800);
  });
}

function setupFooterHTML(){
  return '<p class="mini center">Positions get picked automatically — you can change them at your club.</p>'+
    '<div class="btnrow"><button class="btn ghost" onclick="setupReroll()">↻ Roll again</button>'+
    '<button class="btn big" onclick="setupStart()">Start in League 3 ▶</button></div>';
}
function randClub(){S.setup.club=choice(PLACES)+' '+choice(SUFFIXES);save();render();}
function randPlayerNames(){
  const used=S.setup.players.map(p=>(p.name||'').trim()).filter(Boolean);
  let filled=0;
  S.setup.players.forEach(p=>{
    if(!p.name||!p.name.trim()){
      const pool=FIRST_NAMES.filter(n=>!used.includes(n));
      const nm=pool.length?choice(pool):'Kid '+rnd(1,99);
      p.name=nm;used.push(nm);filled++;
    }
  });
  save();render();
  if(!filled)toast('Everyone has a name! Clear a box to re-roll it.');
}
function setupMgr(v){S.setup.manager=v.slice(0,16);save();}
function setupClub(v){S.setup.club=v.slice(0,18);save();}
function setupBadge(b){S.setup.badge=b;save();render();}
function setupDiff(d){S.setup.diff=d;save();render();}
function setupColor(c){S.setup.color=c;save();render();}
function setupNext(){
  const m=S.setup.manager,c=S.setup.club;
  const err=checkName(m,'The manager')||checkName(c,'Your club');
  if(err){toast(err);return;}
  S.setupStep=2;save();render();
}
function setupPName(i,v){S.setup.players[i].name=v.slice(0,14);save();}
function setupRoll(){
  const btn=$('#rollSquadBtn');
  if(btn){btn.disabled=true;btn.textContent='Rolling…';}
  const mod=DIFFS[S.setup.diff].mod;
  S.setup.players.forEach((p,i)=>{
    setTimeout(()=>{
      const attrs={};
      ATTRS.forEach(a=>attrs[a[0]]=rollAttr(mod));
      p.attrs=attrs;save();
      const card=$('#pc'+i);
      if(card){
        card.classList.remove('pop');void card.offsetWidth;card.classList.add('pop');
        ATTRS.forEach(a=>{$('#pc'+i+a[0]).textContent=attrVal(attrs[a[0]]);});
        $('#pcT'+i).textContent='Σ '+ATTRS.reduce((s,a)=>s+attrs[a[0]].value,0);
      }
      vibrate(20);
      if(i===S.setup.players.length-1){const f=$('#squadFooter');if(f)f.innerHTML=setupFooterHTML();}
    },380*i+250);
  });
}
function setupReroll(){S.setup.players.forEach(p=>p.attrs=null);save();render();setupRoll();}
function setupStart(){
  for(const p of S.setup.players){
    if(p.name&&isRude(p.name)){toast('One of those player names is a bit rude! 😅');return;}
    if(!p.attrs){toast('Roll the squad first!');return;}
  }
  buildWorld();
  render();
  toast('Welcome to '+userTeam().name+', '+S.manager.name+'! 🎉');
}

function upgrade(kind){
  if(kind==='stadium'){
    const cost=STAD_COST[S.stadium-1];
    if(S.stadium>=5||S.coins<cost)return;
    S.coins-=cost;S.stadium++;userTeam().stadium=S.stadium;
    toast('⬆️ '+STADIUMS[S.stadium-1]+' built! Home advantage now +'+homeAdvOf(userTeam()));
  }else{
    const cost=SHOP_COST[S.shop-1];
    if(S.shop>=5||S.coins<cost)return;

}

function wait(ms){return new Promise(r=>{if(live&&live.skip)r();else live.timer=setTimeout(r,ms);});}
function dockStatus(txt){
  const dock=$('#dock');
  if(!dock)return;
  dock.className='dock passive';
  dock.innerHTML='<div class="dstatus">'+txt+'</div>';
}
function makeLiveIO(){
  return {
    async roll(req){
      if(!live||live.cancel)throw 'abandoned';
      if(!req.mine||live.skip){
        if(!live.skip&&!req.silent){
          dockStatus('🎲 '+esc(req.who||'They')+' roll…');
          await wait(req.kind==='talk'?450:550);
        }
        if(!live||live.cancel)throw 'abandoned';
        const dice=rollN(req.n);
        return (req.kind==='shot'||req.kind==='defend')?{dice,boost:0}:dice;
      }
      return await new Promise(res=>{
        live.pending={req,res};
        renderDock(req);
      });
    },
    async event(e){
      addEvent(e,live&&live.skip);
      if(e.t==='shot'&&e.goal&&e.score)updateScore(e.score);
      if(e.t==='ft'&&e.score)updateScore(e.score);
      if(live&&!live.skip&&e.mine&&(e.t==='chance'||e.t==='shot'||e.t==='talk'||e.t==='penroll'||e.t==='penwin')){
        showBanner(e);
        await wait(bannerTime(e));
      }
    }
  };
}
function bannerTime(e){
  if(e.t==='shot')return 1700;
  if(e.t==='chance')return e.big?1300:1100;
  return 1100;
}
function updateScore(sc){const el=$('#sbScore');if(el)el.textContent=sc[0]+' – '+sc[1];}
function showBanner(e){
  const dock=$('#dock');
  if(!dock)return;
  let cls='',b1='',b2='';
  if(e.t==='talk'){cls='good';b1='📣 '+e.ch+' chances!';b2='Your leadership '+e.lea+' v their '+e.opp+', +'+e.add+' −'+e.sub;}
  else if(e.t==='chance'){
    if(e.big){cls='good';b1='🔥 BIG CHANCE!';b2='You rolled '+e.total+' — you needed 20+';}
    else{cls='bad';b1='No chance…';b2='You rolled '+e.total+' — you needed 20+';}
  }
  else if(e.t==='shot'){
    const yourRoll='You rolled '+e.rolled+(e.boost?' + 🔥'+e.boost+' boost':'')+' — needed '+e.needed+'+';
    if(e.mineAtk){
      if(e.goal){cls='good';b1='⚽ GOOOAL!';b2=yourRoll+(e.screamer?' · 💥 SCREAMER!':'')+(e.uas?' · ⭐ star strike!':'')+' · '+esc(e.scorer)+' scores!';}
      else{cls='bad';b1='🧤 Saved!';b2=yourRoll+(e.uds?' · ⭐ their star defender blocked it!':'')+(e.worldie?' · their WORLDIE double-six!':'');}
    }else{
      if(e.goal){cls='bad';b1='😖 Goal against you';b2=yourRoll+(e.uas?' · ⭐ their star forced it in!':'')+(e.screamer?' · their SCREAMER double-six!':'');}
      else{cls='good';b1='🧱 SAVED!';b2=yourRoll+(e.worldie?' · 🧤 WORLDIE double-six!':'')+(e.uds?' · ⭐ star save!':'')+' · '+esc(e.saver)+' the hero!';}
    }
  }
  else if(e.t==='penroll'){
    const win=e.h===e.a?null:(e.h>e.a);
    cls=win===null?'':'good';b1='🥅 '+e.h+' vs '+e.a;b2=win===null?'Level — roll again!':'';
  }
  else if(e.t==='penwin'){cls=e.mine?'good':'bad';b1=e.mine?'🏆 YOU WIN THE SHOOT-OUT!':'💔 '+esc(e.name)+' win the shoot-out';b2='';}
  dock.className='dock';
  dock.innerHTML='<div class="dockbanner '+cls+'"><div class="b1">'+b1+'</div><div class="b2">'+b2+'</div></div>';
}
let dockBoostVal=0;
function renderDock(req){
  const dock=$('#dock');
  if(!dock)return;
  dockBoostVal=0;
  const boostCost=BOOST_COSTS[Math.min(live.boostN,BOOST_COSTS.length-1)];
  const canBoost=req.boostable&&S.coins>=boostCost;
  dock.className='dock';
  dock.innerHTML=
    '<div class="dtitle">'+req.title+'</div>'+
    '<div class="ddetail">'+req.detail+'</div>'+
    '<div class="dtarget" id="dockTarget">'+req.target+'</div>'+
    '<div class="rollzone" id="dockDice">'+rollN(req.n).map(v=>dieHTML(v,req.n>2?'mid':'')).join('')+'</div>'+
    (req.boostable?'<button class="btn gold slim" id="boostBtn" '+(canBoost?'':'disabled')+' onclick="dockBoost()">🔥 Boost +2 to your roll · 🪙 '+boostCost+'</button>':'')+
    '<button class="btn big" id="dockRoll" onclick="dockRoll()">🎲 ROLL!</button>';
}
function dockBoost(){
  if(!live||!live.pending)return;
  const cost=BOOST_COSTS[Math.min(live.boostN,BOOST_COSTS.length-1)];
  if(S.coins<cost)return;
  S.coins-=cost;live.boostN++;dockBoostVal+=2;save();updateHeader();
  const b=$('#boostBtn');
  if(b){b.textContent='🔥 Boosted! Your roll counts +'+dockBoostVal;b.disabled=true;}
  const req=live.pending.req;
  if(req.needed){
    const tg=$('#dockTarget');
    if(tg)tg.textContent='🎯 Now roll '+Math.max(2,req.needed-dockBoostVal)+' or more — the boost helps you!';
  }
}
async function dockRoll(){
  if(!live||!live.pending)return;
  const {req,res}=live.pending;
  const btn=$('#dockRoll');
  if(btn)btn.disabled=true;
  const bb=$('#boostBtn');
  if(bb)bb.disabled=true;
  const dice=rollN(req.n);
  const zone=$('#dockDice');
  if(zone)await animateDice(zone,dice);
  const boost=dockBoostVal;dockBoostVal=0;
  live.pending=null;
  res((req.kind==='shot'||req.kind==='defend')?{dice,boost}:dice);
}
function skipMatch(){
  if(!live)return;
  live.skip=true;
  if(live.timer)clearTimeout(live.timer);
  dockBoostVal=0;
  dockStatus('⏭ Skipping to the result…');
  if(live.pending){
    const {req,res}=live.pending;
    live.pending=null;
    res((req.kind==='shot'||req.kind==='defend')?{dice:rollN(req.n),boost:0}:rollN(req.n));
  }
}
function addEvent(e,instant){
  const feed=$('#feed');
  if(!feed)return;
  const d=document.createElement('div');
  if(e.t==='start'){d.className='ev evhalf';d.innerHTML=e.neutral?'🏟️ Neutral ground — no home advantage':'🏟️ '+esc(e.homeName)+'’s crowd: +'+e.adv+' to their attacks';}
  else if(e.t==='half'){d.className='ev evhalf';d.innerHTML=e.n===1?'🟢 First half — kick off!':'🔁 Second half';}
  else if(e.t==='talk'){d.className='ev';d.innerHTML='📣 <b>'+esc(e.name)+'</b>: lead '+e.lea+' v '+e.opp+', +'+e.add+' −'+e.sub+' → <b>'+e.ch+' chances</b>';}
  else if(e.t==='chance'){
    d.className='ev'+(e.big?' evbig':'');
    d.innerHTML=(e.late?'⏱️ ':'⚡ ')+'<b>'+esc(e.name)+'</b>: '+miniDice(e.dice)+' = <b>'+e.total+'</b>'+(e.big?' — 🔥 BIG CHANCE!':' — nothing there');
  }
  else if(e.t==='shot'){
    const detail='needed '+e.needed+'+, rolled '+e.rolled+(e.boost?' +🔥'+e.boost:'')+
      (e.screamer?' · 💥 Screamer':'')+(e.worldie?' · 🧱 Worldie':'')+(e.uas?' · ⭐atk':'')+(e.uds?' · ⭐def':'');
    if(e.goal){
      d.className='ev evgoal';
      d.innerHTML='⚽ <b>GOAL!</b> '+e.minute+'&prime; <b>'+esc(e.scorer)+'</b> ('+esc(e.name)+')'+(e.assist!=='No Assist'?' · assist '+esc(e.assist):'')+'<br><small>'+detail+'</small>';
      if(!instant)vibrate([40,60,40]);
    }else{
      d.className='ev';
      d.innerHTML='🧤 <b>'+esc(e.saver)+' saves it!</b> ('+esc(e.defName)+')<br><small>'+detail+'</small>';
    }
  }
  else if(e.t==='ft'){d.className='ev evhalf';d.innerHTML='📢 <b>Full time: '+e.score[0]+' – '+e.score[1]+'</b>';}
  else if(e.t==='scramble'){d.className='ev evbig';d.innerHTML='⏱️ <b>Still 0–0 — stoppage-time scramble!</b> One last chance each!';}
  else if(e.t==='pens'){d.className='ev evbig';d.innerHTML='😱 <b>A draw — PENALTY ROLL-OFF!</b> One die each, highest wins!';}
  else if(e.t==='penroll'){d.className='ev';d.innerHTML='🥅 '+esc(e.homeName)+' '+miniDice([e.h])+' vs '+miniDice([e.a])+' '+esc(e.awayName)+(e.h===e.a?' — level! Again!':'');}
  else if(e.t==='penwin'){d.className='ev evgoal';d.innerHTML='🏆 <b>'+esc(e.name)+' win on penalties!</b>';}
  feed.prepend(d);
}

  S.coins+=o.amount;
  let wi=0;
  buyer.players.forEach((q,i)=>{if(pTotal(q)<pTotal(buyer.players[wi]))wi=i;});
  buyer.players[wi]=Object.assign({},p,{out:null});
  autoAssign(buyer);
  const rk=genPlayer(-1,18,18,t.players.map(x=>x.name));
  t.players[idx]=rk;
  S.pendingOffer=null;
  save();closeModal();render();
  toast('💸 '+p.name+' joins '+buyer.name+'! 🎓 '+rk.name+' (18) promoted.');
}

/* ---------- friend challenges ---------- */
function tcClean(s){return (s||'').replaceAll('|','').replaceAll('~','');}
function tcChecksum(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h.toString(36).slice(0,4).padStart(4,'0');}
function teamToCode(t,mgr,kitStyle){
  const enc=p=>ATTRS.map(a=>{const at=p.attrs[a[0]];return (at.star?17:(at.value-2)).toString(18);}).join('');
  const parts=[tcClean(t.name),t.badge,t.kitColor,kitStyle||'plain',String(t.stadium||1),String(t.tier===undefined?2:t.tier),tcClean(mgr||'AI')]
    .concat(t.players.map(p=>tcClean(p.name)+'~'+p.age+'~'+enc(p)));
  const raw=parts.join('|');
  return 'AFD1.'+tcChecksum(raw)+'.'+btoa(unescape(encodeURIComponent(raw)));
}
function exportTeamCode(){
  return teamToCode(userTeam(),S.manager.name,S.kits.style);
}
function importTeamCode(code){
  try{
    code=(code||'').trim().replace(/\s+/g,'');
    if(!code.startsWith('AFD1.'))return {err:'That doesn’t look like a team code.'};
    const bits=code.split('.');
    if(bits.length!==3)return {err:'That code is incomplete — copy the whole thing.'};
    const raw=decodeURIComponent(escape(atob(bits[2])));
    if(tcChecksum(raw)!==bits[1])return {err:'That code got scrambled in the post — ask for it again.'};
    const parts=raw.split('|');
    if(parts.length!==13)return {err:'That code is missing bits — copy the whole thing.'};
    const name=parts[0],badge=parts[1],kitColor=parts[2],stad=parts[4],tier=parts[5],mgr=parts[6];
    if(!name||isRude(name)||isRude(mgr))return {err:'That team has a rude name — not in this game! 😅'};
    const players=parts.slice(7).map(seg=>{
      const ps=seg.split('~');
      const pn=ps[0],ageS=ps[1],attrS=ps[2];
      if(!pn||isRude(pn)||!attrS||attrS.length!==5)throw 0;
      const attrs={};
      ATTRS.forEach((a,i)=>{
        const v=parseInt(attrS[i],18);
        if(isNaN(v)||v<0||v>17)throw 0;
        const star=v>=9;
        attrs[a[0]]={dice:[0,0],raw:star?11:v+2,value:star?10:clamp(v+2,2,10),star};
      });
      return {name:pn.slice(0,14),age:clamp(parseInt(ageS,10)||22,15,40),attrs,out:null};
    });
    if(players.length!==6)throw 0;
    return {team:{id:'friend_'+uid(),name:name.slice(0,18),badge:badge||'⚽',
      tier:clamp(parseInt(tier,10)||2,0,2),players,stadium:clamp(parseInt(stad,10)||1,1,5),
      kitColor:kitColor||'#e63946',manager:(mgr||'A friend').slice(0,16)}};
  }catch(e){return {err:'Could not read that code — copy it exactly as it was sent.'};}
}
let challengeTeam=null;
let lastChallenge=null;
function makeResultCode(r,friend){
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const raw=[id,tcClean(userTeam().name),userTeam().badge,tcClean(S.manager.name),
    tcClean(friend.name),friend.badge,tcClean(friend.manager),
    r.homeScore,r.awayScore,r.penWinnerId?(r.penWinnerId===S.clubId?'H':'A'):'-'].join('|');
  return 'AFR1.'+tcChecksum(raw)+'.'+btoa(unescape(encodeURIComponent(raw)));
}
function importResultCode(text){
  const m=(text||'').match(/AFR1\.[a-z0-9]{4}\.[A-Za-z0-9+/=]+/);
  if(!m)return {none:true};
  try{
    const bits=m[0].split('.');
    const raw=decodeURIComponent(escape(atob(bits[2])));
    if(tcChecksum(raw)!==bits[1])return {err:'That result code got scrambled — ask for it again.'};
    const p=raw.split('|');
    if(p.length!==10)return {err:'That result code is missing bits — copy the whole thing.'};
    return {res:{id:p[0],hClub:p[1],hBadge:p[2],hMgr:p[3],aClub:p[4],aBadge:p[5],aMgr:p[6],
      hs:clamp(parseInt(p[7],10)||0,0,30),as:clamp(parseInt(p[8],10)||0,0,30),pen:p[9]}};
  }catch(e){return {err:'Could not read that result code.'};}
}
function recordImportedResult(res){
  const my=userTeam().name;
  let mine,theirs,them,themBadge,themMgr,penMine;
  if(res.hClub===my){mine=res.hs;theirs=res.as;them=res.aClub;themBadge=res.aBadge;themMgr=res.aMgr;penMine=res.pen==='H';}
  else if(res.aClub===my){mine=res.as;theirs=res.hs;them=res.hClub;themBadge=res.hBadge;themMgr=res.hMgr;penMine=res.pen==='A';}
  else return 'That result is '+res.hClub+' v '+res.aClub+' — it doesn’t include your club!';
  if(isRude(them)||isRude(themMgr))return 'That result has a rude name in it — rejected!';
  S.seenResults=S.seenResults||[];
  if(S.seenResults.includes(res.id))return 'You’ve already recorded that result!';
  S.seenResults.push(res.id);
  if(S.seenResults.length>60)S.seenResults=S.seenResults.slice(-60);
  const wdl=res.pen!=='-'?(penMine?'W':'L'):(mine>theirs?'W':mine===theirs?'D':'L');
  S.rivals=S.rivals||[];
  let rec=S.rivals.find(x=>x.club===them);
  if(!rec){rec={club:them,badge:themBadge||'⚽',mgr:themMgr,W:0,D:0,L:0,last:''};S.rivals.push(rec);}
  rec[wdl]++;rec.mgr=themMgr;
  rec.last=mine+'–'+theirs+(res.pen!=='-'?(penMine?' 🥅W':' 🥅L'):'');
  save();closeModal();render();
  toast(wdl==='W'?'🏆 Victory recorded: '+mine+'–'+theirs+' vs '+them+'!':wdl==='L'?'Recorded: '+mine+'–'+theirs+' vs '+them+' 😅':'Draw recorded vs '+them);
  return null;
}

let fbTok=null,fbTokExp=0,flCache=null;
function flErr(e){
  const m=(e&&e.message)||String(e);
  if(/Failed to fetch|NetworkError|TypeError/i.test(m))return 'No connection — online leagues need the internet (and the real game website, not the preview).';
  if(/PERMISSION_DENIED|insufficient permissions/i.test(m))return 'The league database isn’t unlocked yet — Dad needs to paste the security rules into Firebase!';
  if(/ADMIN_ONLY_OPERATION|CONFIGURATION_NOT_FOUND|OPERATION_NOT_ALLOWED/i.test(m))return 'Anonymous sign-in isn’t switched on in Firebase yet.';
  return 'Online hiccup: '+m.slice(0,90);
}
async function fbAuth(){
  if(fbTok&&Date.now()<fbTokExp-60000)return fbTok;
  if(S.fb&&S.fb.refresh){
    const r=await fetch('https://securetoken.googleapis.com/v1/token?key='+FB.key,{method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(S.fb.refresh)});
    const j=await r.json();
    if(j.id_token){fbTok=j.id_token;fbTokExp=Date.now()+(parseInt(j.expires_in,10)||3600)*1000;return fbTok;}
    S.fb=null;save();
  }
  const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+FB.key,{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({returnSecureToken:true})});
  const j=await r.json();
  if(!j.idToken)throw new Error(j.error?j.error.message:'sign-in failed');
  S.fb={uid:j.localId,refresh:j.refreshToken};save();
  fbTok=j.idToken;fbTokExp=Date.now()+3600*1000;
  return fbTok;
}
function fsBase(){return 'https://firestore.googleapis.com/v1/projects/'+FB.pid+'/databases/(default)/documents/';}
function fsEnc(obj){
  const f={};
  Object.entries(obj).forEach(([k,v])=>{
    if(typeof v==='number')f[k]={integerValue:String(Math.round(v))};
    else if(typeof v==='boolean')f[k]={booleanValue:v};
    else f[k]={stringValue:String(v)};
  });
  return {fields:f};
}
function fsDec(doc){
  const o={};
  if(!doc||!doc.fields)return doc?o:null;
  Object.entries(doc.fields).forEach(([k,v])=>{
    if(v.stringValue!==undefined)o[k]=v.stringValue;
    else if(v.integerValue!==undefined)o[k]=parseInt(v.integerValue,10);
    else if(v.booleanValue!==undefined)o[k]=v.booleanValue;
  });
  o.__ut=doc.updateTime;
  return o;
}
async function fsReq(pathAndQuery,opts){
  const tok=await fbAuth();
  const r=await fetch(fsBase()+pathAndQuery,Object.assign({headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'}},opts||{}));
  let j={};
  try{j=await r.json();}catch(e){}
  if(!r.ok){
    const e=new Error(j.error?j.error.message:('HTTP '+r.status));
    e.status=r.status;throw e;
  }
  return j;
}
async function fsGet(path){
  try{return fsDec(await fsReq(path));}
  catch(e){if(e.status===404)return null;throw e;}
}
function fsMask(obj,extra){
  const qs=Object.keys(obj).map(k=>'updateMask.fieldPaths='+k);
  if(extra)qs.push(extra);
  return qs.join('&');
}
async function fsSet(path,obj,precondUt){
  return fsReq(path+'?'+fsMask(obj,precondUt?('currentDocument.updateTime='+encodeURIComponent(precondUt)):null),
    {method:'PATCH',body:JSON.stringify(fsEnc(obj))});
}
async function fsCreate(path,obj){
  return fsReq(path+'?'+fsMask(obj,'currentDocument.exists=false'),{method:'PATCH',body:JSON.stringify(fsEnc(obj))});
}
async function fsList(collPath){
  const j=await fsReq(collPath+'?pageSize=50');
  return (j.documents||[]).map(fsDec);
}
async function fsDelete(path){return fsReq(path,{method:'DELETE'});}
function flCodeGen(){const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<8;i++)s+=A[Math.floor(Math.random()*A.length)];return s;}
function singleRR(n){
  const t=[];for(let i=0;i<n;i++)t.push(i);
  const rounds=[];
  for(let r=0;r<n-1;r++){
    const pairs=[];
    for(let i=0;i<n/2;i++){
      const a=t[i],b=t[n-1-i];
      pairs.push(r%2?{h:b,a:a}:{h:a,a:b});
    }
    rounds.push(pairs);
    t.splice(1,0,t.pop());
  }
  return rounds;
}

  const rows=ids.map(g=>({g,uid:state.teams[g].uid,name:flTeamName(state,g),P:0,W:0,D:0,L:0,GD:0,Pts:0}));
  (state.res[div]||[]).forEach(rd=>rd.forEach(r=>{

    else{h.D++;a.D++;h.Pts++;a.Pts++;}
  }));

        (ls.lines||[]).map(l=>'<p class="mini" style="margin:3px 0">'+esc(l)+'</p>').join('')+'</div>'+tblHtml+
        (iAmHost?'<button class="btn gold big" onclick="flNewSeason()">🔁 Start season '+(root.season+1)+'</button>':'<p class="mini">The host can start the next season.</p>');
    }else{
      const played=plays.some(p=>p.uid===me&&p.week===pk);

      body+='<p class="mini">Season '+root.season+' · Turn '+root.week+' of '+state.weeks.length+' · '+lgWeekLabel(state,root.week)+'</p>';
      if(myMember&&!played){
        body+='<button class="btn gold big" onclick="lgBeginTurn()">▶ Play my turn</button>';
      }else{
        body+='<p class="mini" style="margin-top:6px">'+(played?'✅ Your turn is done. ':'')+
          (waiting.length?'Waiting for: '+waiting.map(m=>{const t=importTeamCode(m.code).team;return esc(t?t.manager:'?');}).join(', ')+' ⏳':'Everyone has played — hit Refresh to complete the week!')+'</p>';
      }
      body+=tblHtml+feedHtml;
      const others=waiting.filter(m=>m.uid!==me);
      if(iAmHost&&others.length){
        body+='<div style="border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-top:8px"><div class="eyebrow">👑 Host tools</div>'+
          others.map(m=>{

async function flStart(){
  modal('<h3>🚀 Kicking off…</h3><p class="mini">Building three divisions and the cup ☁️</p>');
  try{
    const {root,members}=await flFetchAll();
    if(root.status!=='setup'){flOpen();return;}
    if(members.some(m=>!m.club)){modal('<h3>😬 Someone joined with an old game version</h3><p class="mini">Everyone must be on Version 0.8 or newer — ask them to update, leave and re-join.</p><button class="btn" onclick="closeModal()">OK</button>');return;}
    const un=new Set(),up=new Set();
    const teams=[];
    for(let d=0;d<2;d++)for(let i=0;i<10;i++){const t=genAITeam(d,un,up);teams.push({c:teamToCode(t,'AI','plain'),uid:null,tier:d});}
    const humans=shuffle(members).map(m=>({c:JSON.parse(m.club).roster,uid:m.uid,tier:2}));
    humans.forEach(h=>{const t=importTeamCode(h.c).team;if(t)un.add(t.name);});
    humans.forEach(h=>teams.push(h));
    for(let i=humans.length;i<10;i++){const t=genAITeam(2,un,up);teams.push({c:teamToCode(t,'AI','plain'),uid:null,tier:2});}
    const divs=[[],[],[]];
    teams.forEach((e,i)=>divs[e.tier].push(i));
    divs[2]=shuffle(divs[2]);
    const fx=divs.map(()=>singleRR(10));
    const order=shuffle(teams.map((e,i)=>i));
    const cup={rounds:[{ties:[],byes:order.slice(0,2)}],champ:null};
    for(let i=2;i<30;i+=2)cup.rounds[0].ties.push({h:order[i],a:order[i+1],hs:null,as:null,w:null});
    const weeks=[{t:'L',r:0},{t:'L',r:1},{t:'L',r:2},{t:'C',r:0},{t:'L',r:3},{t:'L',r:4},{t:'C',r:1},{t:'L',r:5},{t:'L',r:6},{t:'C',r:2},{t:'L',r:7},{t:'C',r:3},{t:'L',r:8},{t:'C',r:4}];
    const state={teams,divs,fx,weeks,cup,res:[[],[],[]],lastSeason:null};
    await fsSet('leagues/'+S.fl.code,{status:'playing',week:1,stateJson:JSON.stringify(state)},root.__ut);
    flOpen();
    toast('Season 1 — good luck, managers! ⚽');
  }catch(e){modal('<h3>😬 Could not start</h3><p class="mini">'+esc(flErr(e))+'</p><button class="btn" onclick="flOpen()">Back</button>');}
}

let lgTurn=null;
function lgMyIdx(){const st=flCache.state;return st.teams.findIndex(e=>e.uid===(S.fb&&S.fb.uid));}
function lgTeamFromClub(club){
  const t=importTeamCode(club.roster).team;
  t.stadium=club.stadium||1;
  t.tier=lgDivOf(flCache.state,lgMyIdx());
  (club.outs||[]).forEach(o=>{if(t.players[o[0]])t.players[o[0]].out={type:o[1],weeks:o[2]};});
  return t;
}

async function lgSaveClub(){
  const club=lgTurn?lgTurn.club:flCache.myClub;
  await fsSet('leagues/'+S.fl.code+'/members/'+S.fb.uid,{club:JSON.stringify(club)});
}
function lgMyFixture(){
  const state=flCache.state,root=flCache.root;
  const my=lgMyIdx();
  const wk=state.weeks[root.week-1];
  if(wk.t==='L'){
    const div=lgDivOf(state,my);
    const local=state.divs[div].indexOf(my);
    const f=state.fx[div][wk.r].find(x=>x.h===local||x.a===local);
    const hG=state.divs[div][f.h],aG=state.divs[div][f.a];
    const oppG=hG===my?aG:hG;
    return {kind:'L',hG,aG,iAmHome:hG===my,oppG,oppHuman:!!state.teams[oppG].uid,oppName:flTeamName(state,oppG),neutral:false};
  }
  const rd=state.cup.rounds[wk.r];
  const tie=rd?rd.ties.find(x=>(x.h===my||x.a===my)&&x.w===null):null;
  if(!tie)return {kind:'none'};
  const oppG=tie.h===my?tie.a:tie.h;
  return {kind:'C',hG:tie.h,aG:tie.a,iAmHome:tie.h===my,oppG,oppHuman:!!state.teams[oppG].uid,oppName:flTeamName(state,oppG),neutral:wk.r===4};
}

    });

    const fitIdx=t.players.map((p,i)=>i).filter(i=>!(myClub.outs||[]).some(o=>o[0]===i));

      ?'No match this week — you’re not in this cup round, but the shop is open.'
      :('Your match: '+(fix.iAmHome?'🏟️ HOME':'🚌 away')+' vs '+(fix.oppHuman?'👤 ':'')+esc(fix.oppName)+(fix.oppHuman?' — head-to-head! You roll your attacks, they roll theirs.':'')))+'</p>'+
    '<button class="btn gold big" onclick="lgToMatch()">'+(fix.kind==='none'?'🛍 Roll shop money ▶':'⚽ To the match ▶')+'</button>');

function lgAfterMatch(r){
  const fix=lgTurn.fix,mySide=live.lg.mySide;
  const mine=mySide==='home'?r.homeScore:r.awayScore;
  const theirs=mySide==='home'?r.awayScore:r.homeScore;
  let wdl=null;
  if(!fix.oppHuman){
    if(r.penWinnerId)wdl=(r.penWinnerId===(mySide==='home'?r.homeId:r.awayId))?'W':'L';
    else wdl=mine>theirs?'W':mine===theirs?'D':'L';
    lgTurn.res={t:fix.kind,hs:r.homeScore,as:r.awayScore,pw:r.penWinnerId?(r.penWinnerId===r.homeId?'h':'a'):null};
    lgTurn.actions.push((wdl==='W'?'won':wdl==='D'?'drew':'lost')+' '+mine+'–'+theirs+' vs '+fix.oppName);
  }else{
    lgTurn.res={t:'h2h',mg:mine};
    lgTurn.actions.push('scored '+mine+' in the head-to-head vs '+fix.oppName);
  }
  lgTurn.wdl=wdl;
  const line=fix.oppHuman?('You scored '+mine+' — '+fix.oppName+' roll their attacks in their own turn!')
    :(r.homeScore+' – '+r.awayScore+(r.penWinnerId?' · 🥅 pens!':''));
  const dock=$('#dock');
  if(dock){
    dock.className='dock';
    dock.innerHTML='<p class="ftline"><b>'+esc(line)+'</b></p>'+
      '<button class="btn gold big" onclick="lgIncome()">💰 Match day money ▶</button>';

  const sk=document.querySelector('.skipbar');
  if(sk)sk.innerHTML='';
}

    '<div class="cardhead" style="margin-top:8px"><span>🛍 Shop level '+club.shop+'</span>'+
    (shopCost?'<button class="btn slim" style="width:auto;margin:0" '+(club.coins>=shopCost?'':'disabled')+' onclick="lgUpgrade(1)">Upgrade 🪙 '+fmt(shopCost)+'</button>':'<b>MAX</b>')+'</div></div>'+
    '<button class="btn gold big" onclick="lgEndTurn()">✅ End my turn</button>';
}
function lgSwap(i){

function lgDoSwap(i,j){
  const t=lgTeamFromClub(lgTurn.club);
  [t.players[i],t.players[j]]=[t.players[j],t.players[i]];
  lgTurn.club.outs=(lgTurn.club.outs||[]).map(o=>[o[0]===i?j:o[0]===j?i:o[0],o[1],o[2]]);
  lgSetTeam(t);lgSaveClub().catch(e=>{});closeModal();lgActionsRender();
}
function lgSell(i){
  const t=lgTeamFromClub(lgTurn.club);
  const p=t.players[i];
  modal('<h3>Sell '+esc(p.name)+'? · <span class="price">🪙 '+fmt(sellOf(p))+'</span></h3><p class="mini">A free academy rookie (18) takes the slot.</p>'+
    '<div class="btnrow"><button class="btn ghost" onclick="closeModal()">Keep</button><button class="btn" onclick="lgDoSell('+i+')">Sell</button></div>');
}
function lgDoSell(i){
  const t=lgTeamFromClub(lgTurn.club);
  const p=t.players[i];
  lgTurn.club.coins+=sellOf(p);
  const rk=genPlayer(-1,18,18,t.players.map(x=>x.name));
  t.players[i]=rk;
  lgTurn.club.outs=(lgTurn.club.outs||[]).filter(o=>o[0]!==i);
  lgTurn.actions.push('sold '+p.name+', promoted rookie '+rk.name);
  lgSetTeam(t);lgSaveClub().catch(e=>{});closeModal();lgActionsRender();
}
function lgBuy(i){
  const p=lgTurn.market[i];
  if(!p)return;
  const t=lgTeamFromClub(lgTurn.club),pr=priceOf(p);
  modal('<h3>Sign '+esc(p.name)+' (Σ '+pTotal(p)+', age '+p.age+') · <span class="price">🪙 '+fmt(pr)+'</span></h3><p class="mini">Who makes way?</p>'+
    t.players.map((q,j)=>{
      const net=pr-sellOf(q),can=lgTurn.club.coins>=net;
      return '<button class="rowbtn'+(can?'':' off')+'" '+(can?('onclick="lgDoBuy('+i+','+j+')"'):'disabled')+'><span><span class="posbadge '+POS_CLASS[j]+'">'+POS_LABEL[j]+'</span> '+esc(q.name)+' (Σ '+pTotal(q)+')</span><b>'+(net>=0?'pay 🪙 '+fmt(net):'gain 🪙 '+fmt(-net))+'</b></button>';
    }).join('')+'<button class="btn ghost" onclick="closeModal()">Cancel</button>');
}
function lgDoBuy(i,j){
  const p=lgTurn.market[i];
  const t=lgTeamFromClub(lgTurn.club);
  const net=priceOf(p)-sellOf(t.players[j]);
  if(lgTurn.club.coins<net){toast('Not enough coins!');return;}
  lgTurn.club.coins-=net;
  lgTurn.actions.push('signed '+p.name+' (Σ'+pTotal(p)+')');
  t.players[j]=p;
  lgTurn.club.outs=(lgTurn.club.outs||[]).filter(o=>o[0]!==j);
  lgTurn.market[i]=null;
  lgSetTeam(t);lgSaveClub().catch(e=>{});closeModal();lgActionsRender();
}
async function lgScout(){
  if(lgTurn.club.coins<SCOUT_FEE){toast('Not enough coins!');return;}
  lgTurn.club.coins-=SCOUT_FEE;
  const p=genPlayer(0,18,33,[]);
  window.__lgScouted=p;
  lgSaveClub().catch(e=>{});
  modal('<h3>🔎 The scout returns with…</h3>'+playerCardHTML(p,'')+

    '<button class="btn" onclick="lgScoutSign()">Sign them!</button></div>');
}
function lgScoutSign(){
  lgTurn.market.push(window.__lgScouted);
