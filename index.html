}
function lgUpgrade(k){
  const club=lgTurn.club;
  if(k===0){const c=STAD_COST[club.stadium-1];if(club.stadium>=5||club.coins<c)return;club.coins-=c;club.stadium++;lgTurn.actions.push('stadium up to level '+club.stadium);}
  else{const c=SHOP_COST[club.shop-1];if(club.shop>=5||club.coins<c)return;club.coins-=c;club.shop++;lgTurn.actions.push('shop up to level '+club.shop);}
  lgSaveClub().catch(e=>{});lgActionsRender();
}
async function lgEndTurn(){
  const root=flCache.root;
  const pk=root.season*100+root.week;
  const payload=Object.assign({log:lgTurn.actions.slice(0,8)},lgTurn.res||{t:'rest'});
  modal('<h3>📤 Ending your turn…</h3><p class="mini">☁️</p>');
  try{
    await lgSaveClub();
    await fsSet('leagues/'+S.fl.code+'/plays/'+S.fb.uid+'_'+pk,{uid:S.fb.uid,week:pk,json:JSON.stringify(payload)});
    await lgResolve();
    lgTurn=null;
    flOpen();
    toast('Turn done! ✅');
  }catch(e){modal('<h3>😬 Could not send your turn</h3><p class="mini">'+esc(flErr(e))+'</p><div class="btnrow"><button class="btn ghost" onclick="closeModal()">Later</button><button class="btn" onclick="lgEndTurn()">🔁 Try again</button></div>');}
}
/* --- week resolver (runs on whichever device finishes last) --- */
async function lgPairScore(state,hG,aG,pm,knockout,neutral){
  const hU=state.teams[hG].uid,aU=state.teams[aG].uid;
  const hP=(hU&&pm[hU]&&pm[hU].t!=='skip')?pm[hU]:null;
  const aP=(aU&&pm[aU]&&pm[aU].t!=='skip')?pm[aU]:null;
  let hs,as,w=null;
  if(hP&&aP&&hP.t==='h2h'&&aP.t==='h2h'){hs=clamp(hP.mg||0,0,30);as=clamp(aP.mg||0,0,30);}
  else if((hP&&hP.t==='h2h')||(aP&&aP.t==='h2h')){
    const p=(hP&&hP.t==='h2h')?hP:aP;
    const skipped=(hP&&hP.t==='h2h')?'away':'home';
    const r=await runMatch(lgT(state,hG),lgT(state,aG),{io:autoIO(),onlySide:skipped});
    const other=skipped==='home'?r.homeScore:r.awayScore;
    if(hP){hs=clamp(p.mg||0,0,30);as=other;}else{as=clamp(p.mg||0,0,30);hs=other;}
  }
  else if(hP||aP){
    const p=hP||aP;
    hs=clamp(p.hs||0,0,30);as=clamp(p.as||0,0,30);
    if(p.pw==='h')w=hG;else if(p.pw==='a')w=aG;
  }
  else{
    const r=await runMatch(lgT(state,hG),lgT(state,aG),{io:autoIO(),knockout,neutral});
    hs=r.homeScore;as=r.awayScore;
    if(r.penWinnerId)w=r.penWinnerId===r.homeId?hG:aG;
  }
  if(knockout&&hs===as&&w===null){let x,y;do{x=d6();y=d6();}while(x===y);w=x>y?hG:aG;}
  return {hs,as,w};
}
async function lgResolve(){
  const all=await flFetchAll();
  if(all.gone||all.root.status!=='playing')return;
  const {root,members,plays}=all;
  const state=all.state;
  const pk=root.season*100+root.week;
  const pm={};
  plays.filter(p=>p.week===pk).forEach(p=>{try{pm[p.uid]=JSON.parse(p.json);}catch(e){}});
  if(!members.every(m=>pm[m.uid]))return;
  const memberByUid={};
  members.forEach(m=>memberByUid[m.uid]=m);
  state.teams.forEach(e=>{
    if(!e.uid)return;
    const m=memberByUid[e.uid];
    if(!m){e.uid=null;return;}
    try{e.c=JSON.parse(m.club).roster;}catch(err){}
  });
  const feedLines=[];
  const wk=state.weeks[root.week-1];
  const nm=g=>flTeamName(state,g);
  if(wk.t==='L'){
    for(let d=0;d<3;d++){
      const round=[];
      for(const f of state.fx[d][wk.r]){
        const hG=state.divs[d][f.h],aG=state.divs[d][f.a];
        const sc=await lgPairScore(state,hG,aG,pm,false,false);
        round.push({h:f.h,a:f.a,hs:sc.hs,as:sc.as});
        if(state.teams[hG].uid||state.teams[aG].uid)feedLines.push(nm(hG)+' '+sc.hs+'–'+sc.as+' '+nm(aG));
      }
      state.res[d].push(round);
    }
  }else{
    const rd=state.cup.rounds[wk.r];
    for(const tie of rd.ties){
      if(tie.w!==null)continue;
      const sc=await lgPairScore(state,tie.h,tie.a,pm,true,wk.r===4);
      tie.hs=sc.hs;tie.as=sc.as;tie.w=sc.w!==null?sc.w:(sc.hs>sc.as?tie.h:tie.a);
      if(state.teams[tie.h].uid||state.teams[tie.a].uid)feedLines.push('🏆 '+nm(tie.h)+' '+sc.hs+'–'+sc.as+' '+nm(tie.a)+(sc.hs===sc.as?' — '+nm(tie.w)+' win on pens!':''));
    }
    const winners=rd.ties.map(t=>t.w).concat(rd.byes||[]);
    if(winners.length===1){state.cup.champ=winners[0];feedLines.push('🏆 CUP WINNERS: '+nm(winners[0])+'!');}
    else if(!state.cup.rounds[wk.r+1]){
      const drawn=shuffle(winners);
      const ties=[];
      for(let i=0;i<drawn.length;i+=2)ties.push({h:drawn[i],a:drawn[i+1],hs:null,as:null,w:null});
      state.cup.rounds.push({ties,byes:[]});
    }
  }
  members.forEach(m=>{
    const p=pm[m.uid];
    if(p&&p.log&&p.log.length){
      const t=importTeamCode(m.code).team;
      feedLines.push('👤 '+(t?t.manager:'?')+': '+p.log.slice(0,4).join(' · '));
    }
  });
  let feed=[];
  try{feed=JSON.parse(root.feedJson||'[]');}catch(e){}
  feed.push({h:'Turn '+root.week+' — '+lgWeekLabel(state,root.week),lines:feedLines.slice(0,14)});
  feed=feed.slice(-4);
  const isLast=root.week>=state.weeks.length;
  if(isLast)lgSeasonEnd(state,feed);
  try{
    await fsSet('leagues/'+S.fl.code,{week:root.week+(isLast?0:1),status:isLast?'finished':'playing',stateJson:JSON.stringify(state),feedJson:JSON.stringify(feed)},root.__ut);
  }catch(e){/* another device resolved first — fine */}
}
function lgSeasonEnd(state,feed){
  const lines=[];
  const prizes={};
  const tables=[0,1,2].map(d=>lgDivTable(state,d));
  tables.forEach((tbl,d)=>{
    lines.push('🏆 Division '+(d+1)+' champions: '+(tbl[0].uid?'👤 ':'')+tbl[0].name);
    tbl.forEach((row,i)=>{
      if(row.uid){
        let coins=PRIZES[d][i]||100;
        let pl=ordinal(i+1)+' in Division '+(d+1)+': 🪙 '+fmt(PRIZES[d][i]||100);
        if(d>0&&i<2){coins+=PROMO_BONUS[d];pl+=' + PROMOTED! 🪙 '+fmt(PROMO_BONUS[d]);}
        if(d<2&&i>=8)pl+=' — relegated 😬';
        prizes[row.uid]={coins,line:pl};
      }
    });
  });
  if(state.cup.champ!==null&&state.cup.champ!==undefined){
    const cu=state.teams[state.cup.champ].uid;
    if(cu&&prizes[cu]){prizes[cu].coins+=1500;prizes[cu].line+=' + CUP WINNERS 🪙 1,500';}
  }
  const up2=tables[1].slice(0,2).map(r=>r.g),down1=tables[0].slice(-2).map(r=>r.g);
  const up3=tables[2].slice(0,2).map(r=>r.g),down2=tables[1].slice(-2).map(r=>r.g);
  state.divs=[
    tables[0].slice(0,8).map(r=>r.g).concat(up2),
    down1.concat(tables[1].slice(2,8).map(r=>r.g)).concat(up3),
    down2.concat(tables[2].slice(2,10).map(r=>r.g))
  ];
  state.lastSeason={prizes,lines};
  feed.push({h:'Season complete! 🏁',lines});
}
async function lgForceSkip(uidX){
  modal('<h3>⏭ Skipping their turn…</h3><p class="mini">☁️</p>');
  try{
    const root=flCache.root;
    const pk=root.season*100+root.week;
    await fsSet('leagues/'+S.fl.code+'/plays/'+uidX+'_'+pk,{uid:uidX,week:pk,json:JSON.stringify({t:'skip',log:['(turn skipped by the host)']})});
    await lgResolve();
    flOpen();
  }catch(e){modal('<h3>😬 Could not skip</h3><p class="mini">'+esc(flErr(e))+'<br>Make sure the NEW security rules are pasted — they allow host skips.</p><button class="btn" onclick="flOpen()">Back</button>');}
}
async function lgRemove(uidX){
  modal('<h3>❌ Removing manager…</h3><p class="mini">Their club becomes a computer team.</p>');
  try{
    await fsDelete('leagues/'+S.fl.code+'/members/'+uidX);
    await lgResolve();
    flOpen();
  }catch(e){modal('<h3>😬 Could not remove</h3><p class="mini">'+esc(flErr(e))+'</p><button class="btn" onclick="flOpen()">Back</button>');}
}
async function flNewSeason(){
  modal('<h3>🔁 New season…</h3><p class="mini">Ageing the computer squads and redrawing fixtures ☁️</p>');
  try{
    const all=await flFetchAll();
    const root=all.root,state=all.state;
    if(root.status!=='finished'){flOpen();return;}
    state.teams.forEach((e,i)=>{
      if(e.uid)return;
      const t=importTeamCode(e.c).team;
      if(!t)return;
      const d=lgDivOf(state,i);
      t.tier=d;
      ageTeam(t,TIER_MOD[d],null);
      aiReinforce(t);
      e.c=teamToCode(t,'AI','plain');
    });
    state.fx=state.divs.map(()=>singleRR(10));
    const order=shuffle(state.teams.map((e,i)=>i));
    state.cup={rounds:[{ties:[],byes:order.slice(0,2)}],champ:null};
    for(let i=2;i<30;i+=2)state.cup.rounds[0].ties.push({h:order[i],a:order[i+1],hs:null,as:null,w:null});
    state.res=[[],[],[]];
    await fsSet('leagues/'+S.fl.code,{status:'playing',week:1,season:(root.season||1)+1,stateJson:JSON.stringify(state),feedJson:'[]'},root.__ut);
    flOpen();
    toast('Season '+((root.season||1)+1)+' — here we go! ⚽');
  }catch(e){modal('<h3>😬 Could not restart</h3><p class="mini">'+esc(flErr(e))+'</p><button class="btn" onclick="flOpen()">Back</button>');}
}
function flLeaveConfirm(){
  modal('<h3>🚪 Leave the league?</h3><p class="mini">Your team drops out of the shared season.</p>'+
    '<div class="btnrow"><button class="btn ghost" onclick="flOpen()">Stay</button>'+
    '<button class="btn" style="background:linear-gradient(180deg,var(--red),#d94848);box-shadow:0 3px 0 #a63030" onclick="flLeave()">Leave</button></div>');
}
async function flLeave(){
  try{await fsDelete('leagues/'+S.fl.code+'/members/'+S.fb.uid);}catch(e){}

  toast('You’ve left the league.');
}
function flDeleteConfirm(){
  modal('<h3>🗑 Delete the league?</h3><p class="mini">This ends it for everyone in it. No undo.</p>'+
    '<div class="btnrow"><button class="btn ghost" onclick="flOpen()">Keep it</button>'+
    '<button class="btn" style="background:linear-gradient(180deg,var(--red),#d94848);box-shadow:0 3px 0 #a63030" onclick="flDelete()">Delete for everyone</button></div>');

async function flDelete(){
  try{await fsDelete('leagues/'+S.fl.code);}catch(e){toast(flErr(e));return;}
  flForget();
  toast('League deleted.');

    '<div class="card"><div class="eyebrow" style="margin-bottom:6px">Career record</div>'+

    '<div class="card"><div class="eyebrow" style="margin-bottom:4px">Honours</div>'+

    '<div class="resrow"><span>🅰️ Most assists in a season</span><b>'+(m.bestAssists?esc(m.bestAssists.player)+' — '+m.bestAssists.n+' (S'+m.bestAssists.season+')':'—')+'</b></div></div>'+
    '<div class="card"><button class="btn ghost" onclick="helpModal()">❓ How the game works</button></div>';

/* ---------- modal & toast ---------- */
function modal(html){
  $('#overlay').innerHTML='<div class="sheet">'+html+'</div>';
  $('#overlay').style.display='flex';
}
function closeModal(){$('#overlay').style.display='none';$('#overlay').innerHTML='';}
let toastTimer=null;
function toast(msg){
  const t=$('#toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ---------- init ---------- */
document.querySelectorAll('#tabbar button').forEach(b=>{b.onclick=()=>go(b.dataset.tab);});
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay'&&!S.pendingOffer)closeModal();});
render();
